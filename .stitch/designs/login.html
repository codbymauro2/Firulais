<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Login Screen - Pet Finder</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2b9dee",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101a22",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden max-w-md mx-auto bg-white dark:bg-background-dark">
<!-- Top App Bar -->
<div class="flex items-center p-4 pb-2 justify-between">
<div class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-center cursor-pointer">
<span class="material-symbols-outlined text-[24px]" style="">arrow_back_ios</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12" style="">Bienvenido</h2>
</div>
<!-- Illustration Hero Section -->
<div class="@container">
<div class="px-6 py-6 flex justify-center">
<div class="w-full max-w-[280px] aspect-square bg-primary/10 rounded-full flex items-center justify-center relative overflow-hidden">
<img class="w-4/5 h-4/5 object-contain" data-alt="A happy cartoon dog and cat sitting together smiling" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD8N9vxXPyKVYaRBKAT-VhqDmS4LwdQZCi0dKXGt3iqN0LoIxt8lFTHv2f0lGRhfquwFQWO2hReJTY3_R-NfGCwb5rgjIrBgM_1Ay7xhpKMQ6MbOb8yMHKnGzBIup3ZyuVkERfc6gvH0Th7kJOthDqkj-yslHzRuEt3S3zYDvsEjX2wh77l8HwQLvU7EXOOrvE89PjgqCDENijCtrcIyYEGqNy-lrzlaF00pIjcuykrGb1Aip_OMLw18awRGX15SxgJtlViVvqOt0o" style="">
</div>
</div>
</div>
<!-- Header Content -->
<div class="px-6 pb-6 text-center">
<h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-3xl font-extrabold leading-tight" style="">Log In</h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-normal pt-2" style="">Join our community and help pets find their way home safely.</p>
</div>
<!-- Login Form -->
<div class="flex flex-col gap-4 px-6">
<label class="flex flex-col w-full" style="">
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal pb-2 px-1" style="">Email Address</p>
<div class="relative">
<div class="absolute inset-y-0 left-4 flex items-center text-slate-400">
<span class="material-symbols-outlined text-[20px]" style="">mail</span>
</div>
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-slate-100 border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/50 focus:border-primary focus:ring-2 focus:ring-primary/20 h-14 pl-12 placeholder:text-slate-400 text-base font-normal" placeholder="your@email.com" type="email" value="">
</div>
</label>
<label class="flex flex-col w-full" style="">
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal pb-2 px-1" style="">Password</p>
<div class="relative">
<div class="absolute inset-y-0 left-4 flex items-center text-slate-400">
<span class="material-symbols-outlined text-[20px]" style="">lock</span>
</div>
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-slate-100 border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/50 focus:border-primary focus:ring-2 focus:ring-primary/20 h-14 pl-12 pr-12 placeholder:text-slate-400 text-base font-normal" placeholder="Enter your password" type="password" value="">
<div class="absolute inset-y-0 right-4 flex items-center text-slate-400 cursor-pointer">
<span class="material-symbols-outlined text-[20px]" style="">visibility</span>
</div>
</div>
</label>
<div class="flex justify-end">
<a class="text-primary text-sm font-bold hover:underline" href="#" style="">Forgot Password?</a>
</div>
<!-- Login Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white h-14 rounded-xl text-base font-bold transition-all shadow-lg shadow-primary/20 mt-2" style="">
                Log In
            </button>
</div>
<!-- Social Logins -->
<div class="px-6 py-8">
<div class="relative flex items-center justify-center mb-8">
<div class="absolute inset-x-0 h-px bg-slate-200 dark:bg-slate-800"></div>
<span class="relative bg-white dark:bg-background-dark px-4 text-sm text-slate-500 font-medium" style="">Or continue with</span>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 h-14 rounded-xl border border-slate-200 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-900/50 transition-colors" style="">
<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-slate-900 dark:text-slate-100 font-bold text-sm" style="">Google</span>
</button>
<button class="flex items-center justify-center gap-2 h-14 rounded-xl border border-slate-200 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-900/50 transition-colors" style="">
<svg class="w-5 h-5 fill-slate-900 dark:fill-white" viewBox="0 0 24 24">
<path d="M17.05 20.28c-.98.95-2.05 1.72-3.23 1.72-1.15 0-1.54-.71-2.92-.71-1.41 0-1.84.7-2.93.7-1.15 0-2.31-.83-3.32-1.78C2.59 18.25 1 15.17 1 12.18c0-3.14 2.03-4.8 4.02-4.8 1.05 0 2.03.73 2.67.73.61 0 1.74-.86 3.01-.86 1.07 0 2.35.39 3.16 1.35-2.58 1.43-2.15 5.14.43 6.42-.58 1.47-1.35 2.91-2.24 3.26zM12.03 7.25c-.02-2.13 1.75-3.92 3.84-4.14.22 2.48-2.3 4.47-3.84 4.14z"></path>
</svg>
<span class="text-slate-900 dark:text-slate-100 font-bold text-sm" style="">Apple</span>
</button>
</div>
</div>
<!-- Footer -->
<div class="mt-auto px-6 py-8 text-center">
<p class="text-slate-600 dark:text-slate-400 text-sm" style="">¿No tienes una cuenta? Registrate</p>
</div>
<!-- Bottom Safe Area Indicator (iOS Style) -->
<div class="h-8 flex justify-center items-end pb-2">
<div class="w-32 h-1.5 bg-slate-200 dark:bg-slate-800 rounded-full"></div>
</div>
</div>
</body></html>
